{% extends "home.html" %}

{% block content %}

<div class="edit-trip-form-container">
    <h2>Updateing {{trip.trip_name}}</h2>

    <form class="edit-trip-form" action="{{url_for('trips.edit_trip', trip_id=trip.id)}}" method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label>Trip Name</label>
        <input type="text" name="trip_name" value="{{trip.trip_name}}" required>

        <label>Start Date</label>
        <input type="date" name="start_date" value="{{trip.start_date}}">

        <label>End Date</label>
        <input type="date" name="end_date" value="{{trip.end_date}}" required>

        <button type="submit">Update Trip</button>
        <a href="{{ url_for('trips.trip_show', trip_id=trip.id)}}">Cancel</a>

    </form>

</div>

{% endblock %}
