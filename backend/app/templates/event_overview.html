{% extends "home.html" %}

{% block content %}
    <div class="main-dashboard">
        <header class="dashboard-header">
            <h2>Flake Dashboard</h2>
            <ul class="dashboard-nav-links">
                <li class="nav-link">A Page Link</li>
                <li class="nav-link">Another Page Link</li>
            </ul>
        </header>
        <div class="event-container">
            <div class="event-heading">
                <h2>{{ event.event_name }}</h2>
            </div>
            <div class="events-index">
                <div class="event-details">
                    <div class="event-info">
                        <span>{{ event.event_date }}</span>
                        <span>{{ event.description }}</span> 
                    </div>
                    <!-- edit -->
                    <a href="{{ url_for('events.edit_event_form', event_id=event.event_id) }}">Edit Event</a>
                    <!-- delete -->
                    <form action="{{ url_for('events.event_delete', event_id=event.event_id) }}" method="POST"><input type="submit" value="Delete Event"></form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
