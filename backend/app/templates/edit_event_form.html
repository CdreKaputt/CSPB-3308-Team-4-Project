{% extends "home.html" %}

{% block content %}
<div class="events-container">
    <header class="events-header">
        <h2>Edit {{ event.event_name }} event</h2>
    </header>
    <div class="events-form">
        <form action="" method="post">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <input type="hidden" name="user_id" value="{{ user.id }}">
            <label for="event_name">Event Name</label>
            <input type="text" id="event_name" name="event_name" value="{{ event.event_name }}" required>
            <label for="event_date">Event Date</label>
            <input type="date" id="event_date" name="event_date" value="{{ event.event_date }}" required>
            <label for="description">Description</label>
            <textarea id="description" name="description" rows="4">{{ event.description }}</textarea>
            <input type="submit" value="Submit">
        </form>
    </div>
    <a href="{{ url_for('events.event_overview', event_id=event.event_id) }}">Back to event overview</a>
</div>
{% endblock %}
