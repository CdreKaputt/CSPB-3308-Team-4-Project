{% extends "home.html" %}

{% block content %}
<div class="events-container">
    <header class="events-header">
        <h2>{{ trip.trip_name }} Itinerary</h2>
        <a href="{{ url_for('events.new_event_form', trip_id=trip.id) }}">New Event</a>
    </header>
    {% for event in events %}
    <div class="event-index-item">
        <h3 class="event-name">{{ event.event_name }}</h3>
        <p class="event-date">{{ event.event_date }}</p>
        <a href="{{ url_for('events.event_overview', event_id=event.event_id) }}">View Details</a>
    </div>
    {% else %}
    <div class="empty-events">
        <p>No events yet. Click "New Event" to start planning your trip.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
